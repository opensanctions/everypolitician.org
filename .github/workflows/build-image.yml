name: build-image

on:
  workflow_dispatch: {}
  schedule:
    # Build a fresh image in case territories or base images have changed
    - cron: "15 8 * * *"
  push: {}
  pull_request: {}

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Set env
        run: echo "BUILD_TIME=$(date +%s)" >> $GITHUB_ENV
      - name: Set build date
        run: echo "BUILD_TIME=$(date +%Y%m%d)" >> $GITHUB_ENV
      - uses: actions/checkout@v6
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/opensanctions/everypolitician
          tags: |
            type=ref,event=branch
            type=raw,value=${{ github.ref == 'refs/heads/main' && 'prod' || 'test' }}
            type=raw,value=latest
      - name: Set build date
        run: echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true
      - name: Login to Github Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push a docker image
        id: build
        uses: docker/build-push-action@v6
        env:
          API_TOKEN: ${{ github.ref == 'refs/heads/main' &&
            secrets.EVERYPOLITICIAN_PROD_API_KEY ||
            secrets.EVERYPOLITICIAN_TEST_API_KEY }}
          BUILDKIT_PROGRESS: plain
          BUILD_DATE: ${{ env.BUILD_DATE }}
          BUILD_TIME: ${{ env.BUILD_TIME }}
        with:
          context: .
          platforms: linux/amd64
          secrets: |
            "api_token=${{ github.ref == 'refs/heads/main' && secrets.EVERYPOLITICIAN_PROD_API_KEY || secrets.EVERYPOLITICIAN_TEST_API_KEY }}"
          build-args: |
            BUILD_DATE=${{ env.BUILD_DATE }}
            NEXT_PUBLIC_API_URL=https://api.${{ github.ref == 'refs/heads/main' && 'opensanctions.org' || 'test.opensanctions.org' }}
            NEXT_PUBLIC_BUILD_TIME=${{ env.BUILD_TIME }}
          pull: true
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # GitHub App requirements for workflow dispatch to trigger ETL deploy in operations repo:
  # App name: opensanctions-operations-deployer (or similar)
  # Installed on: opensanctions/operations
  # Permissions: Actions - 'write'
  # Secrets required in this repo:
  #   OPERATIONS_DEPLOY_APP_ID  — numeric GitHub App ID
  #   OPERATIONS_DEPLOY_APP_KEY — PEM private key
  trigger-deploy:
    if: |
      (
        (github.event_name == 'schedule' || github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
        (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
      )
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.OPERATIONS_DEPLOY_APP_ID }}
          private-key: ${{ secrets.OPERATIONS_DEPLOY_APP_KEY }}
          owner: opensanctions
          repositories: operations
      - name: Trigger ETL deploy
        run: |
          curl --fail --silent --show-error --location -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/opensanctions/operations/actions/workflows/deploy-everypolitician.yml/dispatches \
            -d '{
                  "ref": "main",
                  "inputs": {
                    "environment": "${{ (github.ref == 'refs/heads/main' || github.event_name == 'schedule') && 'prod' || 'test' }}",
                    "image_version": "@${{ needs.docker.outputs.digest }}"
                  }
                }'
